---
# Ansible Inventory for IdM Wildcard Certificate Profile Deployment
#
# Usage:
#   ansible-playbook -i inventory-idm-example.yml playbooks/deploy-idm-wildcard-profile.yml
#   ansible-playbook -i inventory-idm-example.yml playbooks/request-ocp-wildcard-cert.yml

all:
  children:
    ipaserver:
      hosts:
        ipa01.example.com:
          ansible_host: 192.168.1.10
      vars:
        # IdM Server Configuration
        ansible_user: root
        ansible_python_interpreter: /usr/bin/python3

        # Certificate Profile Settings
        profile_name: caOCPWildcardCert
        caacl_name: ocp_wildcard_certs

        # OpenShift Configuration
        ocp_domain: ocp.example.com
        ocp_apps_domain: apps.ocp.example.com
        ocp_api_hostname: api.ocp.example.com
        ocp_service_principal: HTTP/api.ocp.example.com

        # Certificate Request Settings
        organization: "Example Organization"
        organizational_unit: "OpenShift Platform"
        country: US
        state: "North Carolina"
        locality: "Raleigh"
        key_size: 2048
        cert_validity_days: 365

    localhost:
      hosts:
        127.0.0.1:
          ansible_connection: local
      vars:
        # Use localhost for certificate request operations
        ipa_server: ipa01.example.com
